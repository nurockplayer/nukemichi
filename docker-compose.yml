services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: nukemichi
      POSTGRES_USER: nukemichi
      POSTGRES_PASSWORD: nukemichi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nukemichi -d nukemichi"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    environment:
      DATABASE_URL: postgresql://nukemichi:nukemichi@postgres:5432/nukemichi
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
